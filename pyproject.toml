[project]
name = "clocking-app"
version = "0.1.0"
description = "A desktop application to register clockings into a CSV file"
requires-python = ">=3.10"
dependencies = [
    "numpy==1.26.4",
    "pandas==2.2.0",
    "PySide6>=6.6.0",
    "python-dateutil==2.8.2",
    "pytz==2024.1",
    "six==1.16.0",
    "tzdata==2024.1",
    "requests~=2.31.0",
    "python-dotenv~=1.0.1",
]

[dependency-groups]
dev = [
    "pytest>=7.4.0",
]
