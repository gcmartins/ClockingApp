name: Go Tests

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clockingapp

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Download CLI/core dependencies
        run: go mod download

      - name: Run unit tests (core + CLI, no GUI)
        run: go test ./internal/... ./cmd/... -v -count=1

      - name: Build CLI binary
        run: go build -v -o clockingapp_cli .

      - name: Install Fyne system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc libgl1-mesa-dev xorg-dev

      - name: Add Fyne dependency
        run: go get fyne.io/fyne/v2@latest

      - name: Build GUI binary
        run: go build -tags gui -v -o clockingapp_gui .
