name: Release Installers

on:
  push:
    branches:
      - release

jobs:
  bump:
    name: Bump Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump_version.outputs.new_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Bump patch version
        id: bump_version
        run: |
          uv version --bump patch
          NEW_VERSION=$(uv version --short)
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: bump version to ${{ steps.bump_version.outputs.new_version }} [skip ci]"
          git push

  build:
    name: Build ${{ matrix.os-name }} installer
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os-name: Linux
          - os: windows-latest
            os-name: Windows
          - os: macos-latest
            os-name: macOS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install app dependencies
        run: uv sync

      - name: Install PyInstaller
        run: uv pip install pyinstaller pillow

      - name: Install Qt system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libglib2.0-0 \
            libdbus-1-3 \
            libegl1 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0

      - name: Build executable (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          uv run pyinstaller \
            --name ClockingApp \
            --onefile \
            --windowed \
            --icon clock.png \
            --add-data "clock.png:." \
            app.py

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          uv run pyinstaller `
            --name ClockingApp `
            --onefile `
            --windowed `
            --icon clock.png `
            --add-data "clock.png;." `
            app.py

      # ── macOS: package as DMG ──────────────────────────────────────────────
      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dmg-staging
          cp -r dist/ClockingApp.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create \
            -volname "ClockingApp" \
            -srcfolder dmg-staging \
            -ov \
            -format UDZO \
            ClockingApp-macos.dmg

      # ── Windows: package as Inno Setup installer ───────────────────────────
      - name: Create Inno Setup installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $iss = @"
          [Setup]
          AppName=ClockingApp
          AppVersion=1.0
          DefaultDirName={autopf}\ClockingApp
          DefaultGroupName=ClockingApp
          OutputDir=.
          OutputBaseFilename=ClockingApp-windows-setup
          Compression=lzma
          SolidCompression=yes
          PrivilegesRequired=admin

          [Files]
          Source: "dist\ClockingApp.exe"; DestDir: "{app}"; Flags: ignoreversion

          [Icons]
          Name: "{group}\ClockingApp"; Filename: "{app}\ClockingApp.exe"
          Name: "{commondesktop}\ClockingApp"; Filename: "{app}\ClockingApp.exe"
          "@
          $iss | Out-File -FilePath installer.iss -Encoding UTF8
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      # ── Upload artifacts ───────────────────────────────────────────────────
      - name: Upload Linux executable
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ClockingApp-linux
          path: dist/ClockingApp

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ClockingApp-macos
          path: ClockingApp-macos.dmg

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ClockingApp-windows
          path: ClockingApp-windows-setup.exe

  publish:
    name: Publish and Release
    needs: [bump, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create GitHub Release

    steps:
      - name: Download all installer artefacts
        uses: actions/download-artifact@v4
        with:
          pattern: ClockingApp-*
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump.outputs.new_version }}
          name: v${{ needs.bump.outputs.new_version }}
          generate_release_notes: true
          files: dist/*
